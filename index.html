<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Palvi ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>

<body>

    <!-- PARTICLES -->

    <div id="petalContainer"></div>

    <!-- INTRO -->

    <section id="introScene">

        <img id="heart" src="assets/heart.png" alt="Heart">

        <div id="tapText">
            TAP TO BEGIN
        </div>

        <div id="birthdayTitle">

            <h2>Happy Birthday</h2>

            <h1>Palvi</h1>

        </div>

    </section>

    <!-- STORY SCENE -->

    <section id="storyScene">

        <div class="storyCard active" id="sceneGirl1">

            <img class="sceneImage" src="assets/girl1.png" alt="Girl 1">

            <p class="quote">

                Some people become memories.<br>
                Some memories become favorites.

            </p>

        </div>

        <div class="storyCard" id="sceneGirl2">

            <img class="sceneImage" src="assets/girl2.png" alt="Girl 2">

            <p class="quote">

                A smile can stay with you<br>
                longer than a thousand conversations.

            </p>

        </div>

        <div class="storyCard" id="sceneGirl3">

            <img class="sceneImage" src="assets/girl3.png" alt="Girl 3">

            <p class="quote">

                Some people don't stay in every chapter,<br>
                but they remain part of the story.

            </p>

        </div>

        <div id="continueHint">

            TAP TO CONTINUE

        </div>

    </section>

    <!-- FINAL LETTER -->

    <section id="finalScene">

        <div id="letterBox">

            <h2>
                Dear Palvi,
            </h2>

            <p id="typedLetter"></p>

        </div>

        <button id="replayBtn">

            ❤️ Replay Story

        </button>

    </section>

    <script src="script.js"></script>

</body>

</html>
